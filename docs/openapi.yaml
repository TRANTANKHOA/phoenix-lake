openapi: 3.0.3
info:
  title: Phoenix Lake API
  description: API for Phoenix Lake — queries, ingestion, and job management.
  version: 0.1.0
  contact:
    name: Phoenix Lake
    url: https://github.com/TRANTANKHOA/phoenix-lake

servers:
  - url: http://localhost:4000/v1
    description: Local development

tags:
  - name: Databases
    description: List and inspect DuckLake databases
  - name: Auth
    description: Authentication, sessions, and API token lifecycle (DRAFT)
  - name: Query
    description: Run and monitor SQL queries
  - name: Ingest
    description: Submit and track file ingestion
  - name: Job
    description: Monitor and control background jobs
  - name: Table
    description: List tables and schemas
  - name: Health
    description: Service health checks

paths:
  /databases:
    get:
      tags: [Databases]
      summary: List DuckLake databases
      description: Returns the three enforced databases (landing, refining, reporting) with metadata.
      responses:
        '200':
          description: List of databases
          content:
            application/json:
              schema:
                type: object
                properties:
                  databases:
                    type: array
                    items:
                      $ref: '#/components/schemas/Database'
    post:
      tags: [Databases]
      summary: Create a database
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DatabaseCreate'
      responses:
        '201':
          description: Database created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Database'
        '400':
          $ref: '#/components/responses/BadRequest'

  /databases/{database}:
    get:
      tags: [Databases]
      summary: Get database details
      parameters:
        - name: database
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Database details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Database'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Databases]
      summary: Update a database
      parameters:
        - name: database
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DatabaseUpdate'
      responses:
        '200':
          description: Database updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Database'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'
    delete:
      tags: [Databases]
      summary: Delete a database
      parameters:
        - name: database
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Database deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteAction'
        '404':
          $ref: '#/components/responses/NotFound'

  /query:
    post:
      tags: [Query]
      summary: Run a SQL query
      description: |
        Runs a SQL query synchronously if it completes within the timeout,
        or enqueues it as an Oban job and returns a handle for async polling.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryRequest'
      responses:
        '200':
          description: Query completed within timeout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResult'
        '202':
          description: Query enqueued for async execution
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryJobResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /query/{job_id}:
    get:
      tags: [Query]
      summary: Get async query results
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Query status with results when complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryJobResult'
        '404':
          $ref: '#/components/responses/NotFound'

  /query/{job_id}/cancel:
    post:
      tags: [Query]
      summary: Cancel a running query
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Query cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobAction'
        '404':
          $ref: '#/components/responses/NotFound'

  /ingest:
    post:
      tags: [Ingest]
      summary: Upload a file to staging
      description: |
        Accepts a file upload and places it in the staging area (S3).
        The ingestion worker automatically picks up staged files and
        loads them into the DuckDB landing database. Data cleaning
        happens later in dbt.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Parquet file to upload
                table:
                  type: string
                  description: Target table name (inferred from filename if omitted)
      responses:
        '202':
          description: Ingestion job enqueued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestAccepted'
        '400':
          $ref: '#/components/responses/BadRequest'

  /ingest/{job_id}:
    get:
      tags: [Ingest]
      summary: Check ingestion job status
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Ingestion status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestStatus'
        '404':
          $ref: '#/components/responses/NotFound'

  /ingest/{job_id}/cancel:
    post:
      tags: [Ingest]
      summary: Cancel an ingestion job
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Ingestion job cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobAction'
        '404':
          $ref: '#/components/responses/NotFound'

  /table:
    get:
      tags: [Table]
      summary: List all tables
      parameters:
        - name: database
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: List of tables
          content:
            application/json:
              schema:
                type: object
                properties:
                  tables:
                    type: array
                    items:
                      $ref: '#/components/schemas/Table'
    post:
      tags: [Table]
      summary: Create a table
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TableCreate'
      responses:
        '201':
          description: Table created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Table'
        '400':
          $ref: '#/components/responses/BadRequest'

  /table/{database}/{table}:
    get:
      tags: [Table]
      summary: Get table with schema
      parameters:
        - name: database
          in: path
          required: true
          schema:
            type: string
        - name: table
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Table details including schema
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Table'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Table]
      summary: Update a table
      parameters:
        - name: database
          in: path
          required: true
          schema:
            type: string
        - name: table
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TableUpdate'
      responses:
        '200':
          description: Table updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Table'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'
    delete:
      tags: [Table]
      summary: Delete a table
      parameters:
        - name: database
          in: path
          required: true
          schema:
            type: string
        - name: table
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Table deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteAction'
        '404':
          $ref: '#/components/responses/NotFound'

  /job:
    get:
      tags: [Job]
      summary: List background jobs
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [queued, running, succeeded, failed]
        - name: queue
          in: query
          schema:
            type: string
            enum: [interactive, ingest, transform, maintenance]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: List of jobs
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/Job'

  /job/{job_id}:
    get:
      tags: [Job]
      summary: Get job details
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '404':
          $ref: '#/components/responses/NotFound'

  /job/{job_id}/cancel:
    post:
      tags: [Job]
      summary: Cancel a job
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Job cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobAction'
        '404':
          $ref: '#/components/responses/NotFound'

  /job/{job_id}/retry:
    post:
      tags: [Job]
      summary: Retry a failed job
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Job retrying
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobAction'
        '404':
          $ref: '#/components/responses/NotFound'

  /auth/login:
    post:
      tags: [Auth]
      summary: Browser login (DRAFT — not yet implemented)
      security: []   # this is how a session/token is obtained; no bearer required
      description: |
        DRAFT endpoint. Browser login flow that authenticates a local
        (email/password) or WorkOS SSO user and sets a session cookie. API
        clients instead mint a `pk_live_` token via `POST /auth/token`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Session established (session cookie set)
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the current session/token (DRAFT — not yet implemented)
      description: |
        DRAFT endpoint. Revokes the session (browser) or the calling token
        (API). After logout the presented token is no longer valid.
      responses:
        '200':
          description: Logged out
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/token:
    get:
      tags: [Auth]
      summary: List the caller's API tokens (DRAFT — not yet implemented)
      description: DRAFT endpoint. Returns token metadata (never the secret).
      responses:
        '200':
          description: List of tokens
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens:
                    type: array
                    items:
                      $ref: '#/components/schemas/Token'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Auth]
      summary: Mint a new API token (DRAFT — not yet implemented)
      description: |
        DRAFT endpoint. Creates a new `pk_live_` token for the authenticated
        user. The full secret is returned **exactly once**; only the bcrypt
        hash and the 8-char prefix are persisted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Human label for the token
                expires_at:
                  type: string
                  format: date-time
                  nullable: true
                  description: Optional expiry; omit for a non-expiring token (default TTL applies per G4).
      responses:
        '201':
          description: Token created — full secret returned once
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenCreated'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/token/{token_id}:
    delete:
      tags: [Auth]
      summary: Revoke an API token (DRAFT — not yet implemented)
      parameters:
        - name: token_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Token revoked
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /health:
    get:
      tags: [Health]
      summary: Service health check
      security: []   # public — no bearer token required
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'

components:
  schemas:
    Database:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        snapshot_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    DatabaseCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string

    DatabaseUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string

    QueryRequest:
      type: object
      required: [sql]
      properties:
        sql:
          type: string
        database:
          type: string
        timeout_ms:
          type: integer
          default: 5000
          description: |
            Client-side deadline in milliseconds for the synchronous response.
            If the query does not finish within `timeout_ms`, the API returns
            `202` with a job handle for async polling instead of holding the
            connection. The DuckDB service enforces a separate, longer server
            fallback timeout (default 30000 ms = 30 s) as a safety net on the
            async path — i.e. 5 s is the sync/wait deadline, 30 s is the hard
            kill for runaway queries.

    QueryResult:
      type: object
      properties:
        columns:
          type: array
          items:
            type: string
        rows:
          type: array
          items:
            type: array
        row_count:
          type: integer
        duration_ms:
          type: integer

    QueryJobResult:
      type: object
      properties:
        status:
          type: string
          enum: [queued, running, succeeded, failed]
        job_id:
          type: string
        result:
          $ref: '#/components/schemas/QueryResult'
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string

    JobAction:
      type: object
      properties:
        status:
          type: string
          example: cancelled
        job_id:
          type: string

    Job:
      type: object
      properties:
        id:
          type: string
        queue:
          type: string
          enum: [interactive, ingest, transform, maintenance]
        status:
          type: string
          enum: [queued, running, succeeded, failed]
        worker:
          type: string
          description: |
            Oban worker module name (the `worker` column of `oban_jobs`), e.g.
            `PhoenixLake.Workers.QueryWorker`. ⚠ verify against the real
            `oban_jobs` schema when implementing — the projected fields here are
            a subset for the API view, not a 1:1 mirror of every Oban column.
        args:
          type: object
        result:
          type: object
        attempts:
          type: integer
        inserted_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time

    IngestAccepted:
      type: object
      properties:
        status:
          type: string
          example: accepted
        job_id:
          type: string
        table:
          type: string

    IngestStatus:
      type: object
      properties:
        status:
          type: string
          enum: [queued, running, succeeded, failed]
        job_id:
          type: string
        table:
          type: string
        rows_inserted:
          type: integer
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string

    Table:
      type: object
      properties:
        name:
          type: string
        database:
          type: string
        description:
          type: string
        row_count:
          type: integer
        size_bytes:
          type: integer
        snapshot_id:
          type: integer
        partition_columns:
          type: array
          items:
            type: string
        columns:
          type: array
          items:
            $ref: '#/components/schemas/Column'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TableCreate:
      type: object
      required: [name, database, columns]
      properties:
        name:
          type: string
        database:
          type: string
        description:
          type: string
        columns:
          type: array
          items:
            $ref: '#/components/schemas/ColumnCreate'
        partition_columns:
          type: array
          items:
            type: string

    TableUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        columns:
          type: array
          items:
            $ref: '#/components/schemas/ColumnCreate'
        partition_columns:
          type: array
          items:
            type: string

    ColumnCreate:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          type: string
        nullable:
          type: boolean
          default: true
        description:
          type: string
        partition_key:
          type: boolean
          default: false

    DeleteAction:
      type: object
      properties:
        status:
          type: string
          example: deleted
        name:
          type: string

    Column:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        nullable:
          type: boolean
        description:
          type: string
        partition_key:
          type: boolean

    Health:
      type: object
      properties:
        status:
          type: string
          example: healthy
        duckdb:
          type: string
          example: connected
        postgres:
          type: string
          example: connected
        s3:
          type: string
          example: connected
        version:
          type: string

    Token:
      type: object
      description: API token metadata. The secret (`pk_live_...`) is never returned.
      properties:
        id:
          type: string
        name:
          type: string
        key_prefix:
          type: string
          description: First 8 characters of the token (used for lookup).
        last_used_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: When the token stops being accepted (persisted, not virtual — see G4).
        created_at:
          type: string
          format: date-time

    TokenCreated:
      type: object
      description: Returned exactly once when a token is minted.
      properties:
        token:
          type: string
          description: The full secret, e.g. `pk_live_<48 random chars>`.
        token_id:
          type: string
        key_prefix:
          type: string

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                properties:
                  code:
                    type: string
                  message:
                    type: string

    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                properties:
                  code:
                    type: string
                  message:
                    type: string

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                properties:
                  code:
                    type: string
                  message:
                    type: string

  parameters:
    JobId:
      name: job_id
      in: path
      required: true
      schema:
        type: string
      description: Job identifier

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      # NOTE: tokens are opaque, NOT JWTs — there is no signature to validate,
      # so OpenAPI's `bearerFormat` is deliberately omitted.
      description: |
        Opaque bearer token (not a JWT). Tokens are random strings of the form
        `pk_live_<48 random chars>` (e.g. `pk_live_a1b2c3...`). Send the full
        token in the Authorization header: `Authorization: Bearer pk_live_...`.
        The API resolves the token by its 8-character prefix and verifies the
        remainder against a stored bcrypt hash (`Bcrypt.verify_pass/2`). Tokens
        are issued by the `/auth/token` endpoints and revoked by `/auth/logout`
        or `DELETE /auth/token/{token_id}`.

# All endpoints require bearerAuth unless an operation overrides with
# `security: []` (see /health and the /auth/login browser flow below).
security:
  - bearerAuth: []

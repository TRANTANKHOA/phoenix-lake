name: API Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: phoenix_lake_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      minio:
        image: minio/minio
        command: server /data --console-address ":9001"
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
          - 9001:9001
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live"
          --health-interval 30s
          --health-timeout 20s
          --health-retries 3

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests pyarrow

      - name: Wait for services
        run: |
          echo "Waiting for Postgres..."
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5432 -U postgres && break
            sleep 1
          done
          echo "Waiting for MinIO..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:9000/minio/health/live && break
            sleep 1
          done

      - name: Initialize Postgres
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: phoenix_lake_test
        run: |
          # DuckDB runs as a separate service, not a Postgres extension
          # DuckLake catalog init will happen when the app starts
          echo "Postgres ready"

      - name: Run API tests
        env:
          BASE_URL: http://localhost:4000/v1
          TIMEOUT: "10"
        run: |
          # Skip if app isn't running (not implemented yet)
          if ! curl -sf http://localhost:4000/v1/health > /dev/null 2>&1; then
            echo "App not running at localhost:4000 — skipping tests"
            exit 0
          fi
          python -m pytest tests/test_api.py -v --tb=short -x

